# ─────────────────────────────────────────────────────
# Decap CMS — Configuration Upglide
# ─────────────────────────────────────────────────────

backend:
  name: git-gateway
  branch: main

locale: fr

media_folder: "images/uploads"
public_folder: "/images/uploads"

# ─────────────────────────────────────────────────────
# COLLECTIONS
# ─────────────────────────────────────────────────────

collections:

  # ── BLOG ──────────────────────────────────────────
  - name: "blog"
    label: "📝 Articles de blog"
    label_singular: "Article"
    files:
      - label: "Tous les articles"
        name: "posts"
        file: "data/blog.json"
        fields:
          - label: "Articles"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}} — {{fields.category}}"
            minimize_collapsed: true
            fields:

              - label: "Titre"
                name: "title"
                widget: "string"
                hint: "Titre affiché sur le blog et dans Google"

              - label: "Slug (URL)"
                name: "slug"
                widget: "string"
                hint: "Ex : mes-marges-sont-trop-basses — lettres minuscules et tirets uniquement, pas d'accents"
                pattern: ['^[a-z0-9-]+$', "Lettres minuscules, chiffres et tirets uniquement"]

              - label: "Date de publication"
                name: "date"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "DD/MM/YYYY"
                time_format: false
                default: ""

              - label: "Catégorie"
                name: "category"
                widget: "select"
                options:
                  - { label: "Marges", value: "Marges" }
                  - { label: "Process", value: "Process" }
                  - { label: "Délégation", value: "Délégation" }
                  - { label: "Pilotage", value: "Pilotage" }
                  - { label: "Marketplaces", value: "Marketplaces" }
                  - { label: "Acquisition", value: "Acquisition" }
                  - { label: "Outils", value: "Outils" }
                  - { label: "Stratégie", value: "Stratégie" }

              - label: "Temps de lecture (minutes)"
                name: "readTime"
                widget: "number"
                default: 5
                value_type: "int"
                min: 1
                max: 60

              - label: "Extrait"
                name: "excerpt"
                widget: "text"
                hint: "1–2 phrases affichées dans la liste du blog et dans Google"

              - label: "Image de couverture (optionnelle)"
                name: "image"
                widget: "image"
                required: false
                hint: "Image affichée en haut de l'article. Formats recommandés : JPG ou PNG, largeur min. 1200 px."

              - label: "Encart résumé (optionnel)"
                name: "summary"
                widget: "text"
                required: false
                hint: "Points clés affichés dans un encart doré au début de l'article. Écrivez 2 à 4 points, un par ligne (touche Entrée entre chaque)."

              - label: "Contenu de l'article"
                name: "content"
                widget: "markdown"
                hint: >
                  TITRE (H2) → apparaît dans le sommaire à gauche de l'article.
                  SOUS-TITRE (H3) → structure interne, ne s'affiche pas dans le sommaire.
                  IMAGES → bouton Image dans la barre d'outils.
                  TABLEAUX → passer en mode "Raw" : | Col 1 | Col 2 | puis |---|---| puis les données.
                  LIENS → sélectionnez un mot, cliquez 🔗, collez l'URL.
                buttons:
                  - bold
                  - italic
                  - link
                  - heading-two
                  - heading-three
                  - quote
                  - bulleted-list
                  - numbered-list
                  - code
                editor_components:
                  - image
                modes:
                  - rich_text
                  - raw

              - label: "Publié"
                name: "published"
                widget: "boolean"
                default: true
                hint: "Décocher = brouillon (non visible sur le site)"

  # ── PODCAST ───────────────────────────────────────
  - name: "podcast"
    label: "🎙️ Épisodes podcast"
    label_singular: "Épisode"
    files:
      - label: "Tous les épisodes"
        name: "episodes"
        file: "data/podcast.json"
        fields:
          - label: "Épisodes"
            name: "episodes"
            widget: "list"
            summary: "Ep. {{fields.number}} — {{fields.title}}"
            minimize_collapsed: true
            fields:

              - label: "Numéro d'épisode"
                name: "number"
                widget: "number"
                value_type: "int"
                min: 1

              - label: "Titre"
                name: "title"
                widget: "string"

              - label: "Date"
                name: "date"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "DD/MM/YYYY"
                time_format: false
                default: ""

              - label: "Durée"
                name: "duration"
                widget: "string"
                hint: "Ex : 28:45"
                required: false

              - label: "Lien principal de l'épisode"
                name: "link"
                widget: "string"
                required: false
                hint: "URL directe vers l'épisode (Spotify, Apple, YouTube…) — ce lien sera le bouton principal d'écoute"

              - label: "Description"
                name: "description"
                widget: "text"
                required: false
                hint: "Affiché sous le titre — résumé de l'épisode en 2–3 phrases"

              - label: "Liens plateformes"
                name: "platforms"
                widget: "object"
                required: false
                hint: "Remplissez uniquement les plateformes où l'épisode est disponible"
                fields:
                  - label: "Spotify"
                    name: "spotify"
                    widget: "string"
                    required: false
                    hint: "URL complète : https://open.spotify.com/episode/..."

                  - label: "Apple Podcasts"
                    name: "apple"
                    widget: "string"
                    required: false
                    hint: "URL complète : https://podcasts.apple.com/..."

                  - label: "YouTube"
                    name: "youtube"
                    widget: "string"
                    required: false
                    hint: "URL complète : https://www.youtube.com/watch?v=..."

                  - label: "Deezer"
                    name: "deezer"
                    widget: "string"
                    required: false
                    hint: "URL complète : https://www.deezer.com/episode/..."

              - label: "Publié"
                name: "published"
                widget: "boolean"
                default: true
                hint: "Décocher = brouillon (non visible sur le site)"
