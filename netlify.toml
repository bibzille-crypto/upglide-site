# ─────────────────────────────────────
# Netlify configuration — Upglide
# ─────────────────────────────────────

[build]
  publish = "."

# ── REDIRECTS (pretty URLs sans .html) ──────────────────────────────────
[[redirects]]
  from = "/accompagnements"
  to   = "/accompagnements.html"
  status = 200

[[redirects]]
  from = "/blog"
  to   = "/blog.html"
  status = 200

[[redirects]]
  from = "/podcast"
  to   = "/podcast.html"
  status = 200

[[redirects]]
  from = "/ressources"
  to   = "/ressources.html"
  status = 200

[[redirects]]
  from = "/a-propos"
  to   = "/a-propos.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

# ── HEADERS ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache, no-store"
    X-Robots-Tag  = "noindex"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/plain; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
